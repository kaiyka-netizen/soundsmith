<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundSmith</title>
<style>
:root{
--bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
--text:#e7ebf3; --sub:#9aa3b2; --accent:#5b8cff; --accentGrad:linear-gradient(135deg,#5b8cff,#8b5bff);
--sel:#2b3550; --radius:14px; --topbar:#13161d; --waveBg:#11141a; --playhead:#ffffff;
--low:#3b82f6; --mid:#22c55e; --high:#f97316;
}
body[data-theme="light"]{
--bg:#f4f6fb; --panel:#ffffff; --panel2:#f0f3f9; --line:#dde3ee;
--text:#1b2230; --sub:#5a6678; --accent:#3b6fff; --accentGrad:linear-gradient(135deg,#3b6fff,#7a4bff);
--sel:#dbe6ff; --topbar:#ffffff; --waveBg:#eef2fa; --playhead:#1b2230;
}
body[data-theme="mikan"]{
--bg:#fff6ec; --panel:#fffaf3; --panel2:#fff0df; --line:#ffd9b0;
--text:#5a3210; --sub:#a8784a; --accent:#ff8c2b; --accentGrad:linear-gradient(135deg,#ff8c2b,#ff5e62);
--sel:#ffe2c2; --topbar:#fffaf3; --waveBg:#fff2e2; --playhead:#5a3210;
--low:#ff9f1c; --mid:#2ec4b6; --high:#e71d36;
}
body[data-theme="sakura"]{
--bg:#fff5f8; --panel:#fffafc; --panel2:#ffeef4; --line:#ffd0e0;
--text:#5c2740; --sub:#b07089; --accent:#ff6fa5; --accentGrad:linear-gradient(135deg,#ff6fa5,#c86bff);
--sel:#ffd9e7; --topbar:#fffafc; --waveBg:#fff0f5; --playhead:#5c2740;
--low:#ff8fab; --mid:#4cc9a0; --high:#ff5d8f;
}
body[data-theme="mint"]{
--bg:#eefcf6; --panel:#f8fffc; --panel2:#e2f7ee; --line:#bdeddc;
--text:#16463a; --sub:#5c9183; --accent:#1fb98a; --accentGrad:linear-gradient(135deg,#1fb98a,#2bb0ff);
--sel:#cdf3e6; --topbar:#f8fffc; --waveBg:#e7faf2; --playhead:#16463a;
--low:#2bb0ff; --mid:#1fb98a; --high:#ffa62b;
}
body[data-theme="grape"]{
--bg:#15101f; --panel:#1d1630; --panel2:#241b3c; --line:#352a55;
--text:#ece7fb; --sub:#a99bd0; --accent:#a06bff; --accentGrad:linear-gradient(135deg,#a06bff,#ff6bd0);
--sel:#3a2c63; --topbar:#1a1330; --waveBg:#1a1430; --playhead:#ece7fb;
--low:#7c6bff; --mid:#36d399; --high:#ff7ad9;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{
background:var(--bg); color:var(--text); font-family:"Segoe UI",system-ui,-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
display:flex; flex-direction:column; overflow:hidden;
}
.topbar{ display:flex; align-items:center; gap:14px; padding:12px 18px; background:var(--topbar); border-bottom:1px solid var(--line); flex-wrap:wrap; flex:none; z-index:20; }
.topbar h1{font-size:19px; margin:0; display:flex; align-items:center; gap:8px;}
.badge{font-size:11px; color:var(--sub); border:1px solid var(--line); padding:3px 8px; border-radius:20px;}
.themewrap{margin-left:auto; display:flex; align-items:center; gap:8px; flex:none;}
select,input,button{font-family:inherit; color:var(--text);}
select,input[type=text],input[type=number]{ background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:7px 9px; outline:none; }
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--accent);}
button{ background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:7px 12px; cursor:pointer; transition:.15s; }
button:hover{border-color:var(--accent);}
button.primary{background:var(--accentGrad); border:none; color:#fff; font-weight:600;}
button.primary:hover{filter:brightness(1.08);}
.tagbar{display:flex; gap:7px; flex-wrap:wrap; padding:10px 18px; background:var(--panel); border-bottom:1px solid var(--line); flex:none;}
.tagbar .lbl{font-size:12px; color:var(--sub); align-self:center; margin-right:2px;}
.chip{font-size:12px; padding:4px 11px; border-radius:20px; border:1px solid var(--line); background:var(--panel2); cursor:pointer; user-select:none;}
.chip.on{background:var(--accentGrad); color:#fff; border:none;}
.randbar{display:flex; gap:9px; flex-wrap:wrap; align-items:center; padding:11px 18px; background:var(--panel); border-bottom:1px solid var(--line); flex:none;}
.randbar .grp{display:flex; gap:6px; align-items:center; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:5px 8px;}
.randbar label{font-size:12px; color:var(--sub);}
.main{display:flex; flex:1; min-height:0;}
.sidebar{width:260px; flex:none; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0;}
.sidebar .head{padding:12px 14px; border-bottom:1px solid var(--line); flex:none;}
.newfolder{display:flex; gap:6px; margin-top:8px;}
.newfolder input{flex:1; min-width:0;}
#folders{overflow-y:auto; flex:1; padding:8px;}
.folder{ display:flex; align-items:center; gap:8px; padding:8px 9px; border-radius:9px; cursor:pointer; user-select:none; font-size:14px; margin-bottom:2px; }
.folder:hover{background:var(--panel2);}
.folder.sel{background:var(--sel);}
.folder.drop{outline:2px dashed var(--accent); outline-offset:-2px;}
.folder .ficon{font-size:16px; cursor:pointer; border-radius:6px; transition:.12s; line-height:1;}
.folder .ficon:hover{transform:scale(1.25);}
.folder .fname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.folder .cnt{font-size:11px; color:var(--sub);}
.folder .acts{display:none; gap:4px;}
.folder:hover .acts{display:flex;}
.folder .acts button{padding:2px 6px; font-size:11px;}
.content{flex:1; display:flex; flex-direction:column; min-height:0;}
.contenthead{padding:10px 18px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:center; flex:none;}
.contenthead .title{font-weight:600;}
.contenthead input[type=text]{flex:1; max-width:340px; margin-left:auto;}
#list{overflow-y:auto; flex:1; padding:12px 18px;}
.track{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 12px; margin-bottom:6px; }
.track .row{display:flex; align-items:center; gap:10px;}
.track .pbtn{ width:38px; height:38px; flex:none; border-radius:50%; border:none; background:var(--accentGrad); color:#fff; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.track .meta{flex:1; min-width:0;}
.track .nm{font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.track .sub{font-size:11px; color:var(--sub); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.track .tg{font-size:10px; padding:2px 7px; border-radius:10px; background:var(--panel2); border:1px solid var(--line);}
.track canvas{width:100%; height:34px; display:block; margin-top:6px; background:var(--waveBg); border-radius:8px; cursor:pointer;}
.track .x{margin-left:auto; background:none; border:none; color:var(--sub); cursor:pointer; font-size:16px; padding:2px 6px;}
.track .x:hover{color:#ff5e62;}
.empty{color:var(--sub); text-align:center; padding:50px 20px; font-size:14px;}
#drop{padding:14px 18px; flex:none;}
.dropzone{ border:2px dashed var(--line); border-radius:12px; padding:16px; text-align:center; color:var(--sub); font-size:13px; transition:.15s; cursor:pointer; }
.dropzone.over{border-color:var(--accent); color:var(--accent); background:var(--panel2);}
#status{font-size:12px; color:var(--sub); margin-top:6px; min-height:16px;}
.banner{margin:0 18px 10px; padding:9px 13px; border-radius:10px; background:var(--panel2); border:1px solid var(--line); font-size:12px; color:var(--sub); display:none;}
.banner.show{display:block;}
/* timeline */
#tlpanel{display:none; border-top:1px solid var(--line); background:var(--panel); flex:none; max-height:240px; flex-direction:column;}
#tlpanel.show{display:flex;}
.tlhead{padding:9px 18px; display:flex; gap:9px; align-items:center; border-bottom:1px solid var(--line);}
.tlwrap{overflow:auto; padding:14px 18px;}
.tltrack{position:relative; height:140px; min-width:600px; background:var(--waveBg); border-radius:8px;}
.clip{position:absolute; top:8px; height:34px; border-radius:6px; background:var(--accentGrad); color:#fff; font-size:10px; padding:3px 6px; cursor:grab; overflow:hidden; white-space:nowrap; box-shadow:0 2px 6px rgba(0,0,0,.3);}
.clip:active{cursor:grabbing;}
.tlgrid{position:absolute; top:0; bottom:0; width:1px; background:var(--line);}
/* emoji popup */
#emojiPop{position:fixed; z-index:100; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:0 10px 30px rgba(0,0,0,.4); display:none; width:268px;}
#emojiPop.show{display:block;}
.epgrid{display:grid; grid-template-columns:repeat(8,1fr); gap:3px; max-height:160px; overflow-y:auto;}
.epgrid button{font-size:18px; padding:4px; background:none; border:none;}
.epgrid button:hover{background:var(--sel);}
.eprow{display:flex; gap:6px; margin-top:8px;}
.eprow input{flex:1; min-width:0;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
::-webkit-scrollbar-thumb:hover{background:var(--sub);}
::-webkit-scrollbar-track{background:transparent;}
</style>
</head>
<body data-theme="dark">
<div class="topbar">
<h1>🛠️ SoundSmith</h1>
<span class="badge">Waveform · Auto-Tag · Mix · Saved</span>
<div class="themewrap">
<label style="font-size:12px;color:var(--sub)">テーマ</label>

<script>
/* ============ IndexedDB persistence ============ */
const DB_NAME="soundsmith", DB_VER=1;
let db=null;
function openDB(){
return new Promise((res,rej)=>{
const r=indexedDB.open(DB_NAME,DB_VER);
r.onupgradeneeded=e=>{
const d=e.target.result;
if(!d.objectStoreNames.contains("blobs")) d.createObjectStore("blobs");
if(!d.objectStoreNames.contains("kv")) d.createObjectStore("kv");
};
r.onsuccess=e=>{db=e.target.result;res(db);};
r.onerror=e=>rej(e.target.error);
});
}
function tx(store,mode){return db.transaction(store,mode).objectStore(store);}
function idbSet(store,key,val){return new Promise((res,rej)=>{const r=tx(store,"readwrite").put(val,key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}
function idbGet(store,key){return new Promise((res,rej)=>{const r=tx(store,"readonly").get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function idbDel(store,key){return new Promise((res,rej)=>{const r=tx(store,"readwrite").delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});}

async function saveFolders(){await idbSet("kv","folders",folders.map(f=>({id:f.id,name:f.name,parentId:f.parentId,fixed:f.fixed,icon:f.icon})));}
async function saveTracksMeta(){
await idbSet("kv","tracks",tracks.map(t=>({id:t.id,name:t.name,size:t.size,folderId:t.folderId,tags:t.tags})));
}
async function saveTheme(t){await idbSet("kv","theme",t);}

/* ============ State ============ */
let folders=[
{id:"all",name:"すべて",parentId:null,fixed:true,icon:"📚"},
{id:"uncat",name:"未分類",parentId:null,fixed:true,icon:"🗂"},
];
let tracks=[];
let selectedFolders=new Set(["all"]);
let activeTags=new Set();
let currentId=null;
let randomSelection=null;
let lastRandomScope="selection";
let mixSource=null, mixCtx=null;
let timeline=null;
let emojiTarget=null;
const TLPPS=140;
const AUDIO_RE=/\.(mp3|wav|ogg|m4a|aac|flac|aiff?|opus)$/i;
const audioCtx=new (window.AudioContext||window.webkitAudioContext)();

/* ============ Theme ============ */
const themeSel=document.getElementById("themeSel");
function setTheme(t){document.body.setAttribute("data-theme",t);themeSel.value=t;saveTheme(t);}
themeSel.onchange=()=>setTheme(themeSel.value);

/* ============ Folder helpers ============ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function folderById(id){return folders.find(f=>f.id===id);}
function folderIcon(f){if(f.icon)return f.icon; if(f.id==="all")return "📚"; if(f.id==="uncat")return "🗂"; return "📁";}
function descendantIds(id){
let out=[id];
for(const f of folders) if(f.parentId===id) out=out.concat(descendantIds(f.id));
return out;
}
function folderTree(){
const roots=folders.filter(f=>f.parentId===null);
const order=[];
function walk(f,depth){order.push({f,depth}); folders.filter(c=>c.parentId===f.id).forEach(c=>walk(c,depth+1));}
roots.forEach(r=>walk(r,0));
return order;
}
function selectedFolderIds(){
if(selectedFolders.has("all")) return null;
let ids=[];
selectedFolders.forEach(id=>{ids=ids.concat(descendantIds(id));});
return new Set(ids);
}
function uploadTarget(){
const arr=[...selectedFolders].filter(id=>id!=="all");
return arr.length?arr[0]:"uncat";
}

/* ============ Tags / selection matching ============ */
function matchesSelection(t){
const ids=selectedFolderIds();
const folderOk = ids===null ? true : ids.has(t.folderId);
let tagOk=true;
if(activeTags.size){tagOk=[...activeTags].every(tg=>t.tags&&t.tags.includes(tg));}
return folderOk && tagOk;
}
function allTags(){
const s=new Set();
tracks.forEach(t=>(t.tags||[]).forEach(tg=>s.add(tg)));
return [...s].sort();
}
function toggleTag(tg){activeTags.has(tg)?activeTags.delete(tg):activeTags.add(tg); renderTagBar(); render();}

/* ============ Rendering ============ */
function renderAll(){renderFolders(); renderTagBar(); render();}

function renderFolders(){
const box=document.getElementById("folders");
box.innerHTML="";
folderTree().forEach(({f,depth})=>{
const cnt = f.id==="all" ? tracks.length : f.id==="uncat" ? tracks.filter(t=>t.folderId==="uncat").length : tracks.filter(t=>descendantIds(f.id).includes(t.folderId)).length;
const el=document.createElement("div");
el.className="folder"+(selectedFolders.has(f.id)?" sel":"");
el.style.paddingLeft=(9+depth*16)+"px";
el.dataset.id=f.id;
el.draggable=!f.fixed;
el.innerHTML=`<span class="ficon" data-icon-edit>${folderIcon(f)}</span>
<span class="fname">${escapeHtml(f.name)}</span>
<span class="cnt">${cnt}</span>
${f.fixed?"":`<span class="acts"><button data-ren>✎</button><button data-del>🗑</button></span>`}`;
box.appendChild(el);
});
}
function renderTagBar(){
const bar=document.getElementById("tagbar");
bar.innerHTML='<span class="lbl">タグ:</span>';
const tags=allTags();
if(!tags.length){bar.innerHTML+='<span style="font-size:12px;color:var(--sub)">（音声を読み込むと自動でタグが付きます）</span>';return;}
tags.forEach(tg=>{
const c=document.createElement("span");
c.className="chip"+(activeTags.has(tg)?" on":"");
c.textContent=tg;
c.onclick=()=>toggleTag(tg);
bar.appendChild(c);
});
}
function getView(){
const q=(document.getElementById("search").value||"").toLowerCase();
return tracks.filter(t=>{
if(!matchesSelection(t)) return false;
if(q){const hay=(t.name+" "+(t.tags||[]).join(" ")).toLowerCase(); if(!hay.includes(q))return false;}
return true;
});
}
function render(){
const names=[...selectedFolders].map(id=>folderById(id)?.name).filter(Boolean);
document.getElementById("viewTitle").textContent=names.join(" + ")+(activeTags.size?` 〔${[...activeTags].join(", ")}〕`:"");
const list=document.getElementById("list");
const view=getView();
if(!view.length){list.innerHTML='<div class="empty">該当する音声がありません。<br>下のエリアにドラッグ&ドロップして追加してください。</div>';return;}
list.innerHTML="";
view.forEach(t=>list.appendChild(trackEl(t)));
}
function trackEl(t){
const el=document.createElement("div");
el.className="track";
const folderName=folderById(t.folderId)?.name||"未分類";
el.innerHTML=`
<div class="row">
<button class="pbtn" data-play>▶</button>
<div class="meta">
<div class="nm">${escapeHtml(t.name)}</div>
<div class="sub">
<span>📁 ${escapeHtml(folderName)}</span>
<span>${t.duration?t.duration.toFixed(1)+"s":(t.loading?"解析中…":"")}</span>
${(t.tags||[]).map(tg=>`<span class="tg">${tg}</span>`).join("")}
</div>
</div>
<button class="x" data-del>✕</button>
</div>
<canvas data-canvas></canvas>`;
const canvas=el.querySelector("canvas");
t.canvas=canvas;
requestAnimationFrame(()=>drawWave(t));
canvas.onclick=e=>{const r=canvas.getBoundingClientRect(); seek(t,(e.clientX-r.left)/r.width);};
el.querySelector("[data-play]").onclick=()=>togglePlay(t);
el.querySelector("[data-del]").onclick=()=>removeTrack(t);
return el;
}
function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ============ Waveform ============ */
function buildPeaks(buffer,n=600){
const ch=buffer.getChannelData(0);
const block=Math.floor(ch.length/n);
const peaks=[];
for(let i=0;i<n;i++){
let min=1,max=-1;
for(let j=0;j<block;j++){const v=ch[i*block+j]||0; if(v<min)min=v; if(v>max)max=v;}
peaks.push([min,max]);
}
return peaks;
}
function colorOf(t){
const tag=(t.tags||[])[0];
if(tag==="Low-End")return getCss("--low");
if(tag==="Bright")return getCss("--high");
if(tag==="Mid")return getCss("--mid");
return "#6b7280";
}
function getCss(v){return getComputedStyle(document.body).getPropertyValue(v).trim()||"#888";}
function drawWave(t){
const c=t.canvas; if(!c||!t.peaks)return;
const dpr=window.devicePixelRatio||1;
const w=c.clientWidth*dpr, h=c.clientHeight*dpr;
c.width=w; c.height=h;
const ctx=c.getContext("2d");
ctx.clearRect(0,0,w,h);
const mid=h/2, n=t.peaks.length, bw=w/n;
const col=colorOf(t);
ctx.fillStyle=col;
for(let i=0;i<n;i++){
const [mn,mx]=t.peaks[i];
const y1=mid+mn*mid, y2=mid+mx*mid;
ctx.fillRect(i*bw, y1, Math.max(1,bw*0.8), Math.max(1,y2-y1));
}
if(t.audio && t.duration){
const p=(t.audio.currentTime/t.duration);
ctx.fillStyle=getCss("--playhead");
ctx.fillRect(p*w,0,2,h);
}
}

/* ============ Auto analysis (FFT) ============ */
function fft(re,im){
const n=re.length;
for(let i=1,j=0;i<n;i++){let bit=n>>1;for(;j&bit;bit>>=1)j^=bit;j^=bit;if(i<j){[re[i],re[j]]=[re[j],re[i]];[im[i],im[j]]=[im[j],im[i]];}}
for(let len=2;len<=n;len<<=1){
const ang=-2*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
for(let i=0;i<n;i+=len){
let cr=1,ci=0;
for(let k=0;k<len/2;k++){
const ur=re[i+k], ui=im[i+k];
const vr=re[i+k+len/2]*cr-im[i+k+len/2]*ci, vi=re[i+k+len/2]*ci+im[i+k+len/2]*cr;
re[i+k]=ur+vr; im[i+k]=ui+vi; re[i+k+len/2]=ur-vr; im[i+k+len/2]=ui-vi;
const ncr=cr*wr-ci*wi; ci=cr*wi+ci*wr; cr=ncr;
}
}
}
}
function analyzeAudio(buffer){
const sr=buffer.sampleRate, ch=buffer.getChannelData(0), N=2048;
const hann=new Float32Array(N); for(let i=0;i<N;i++)hann[i]=0.5-0.5*Math.cos(2*Math.PI*i/(N-1));
const bands={sub:0,bass:0,lowmid:0,mid:0,highmid:0,high:0};
let frames=0, rmsSum=0, peak=0, centroidNum=0, centroidDen=0, flux=0, prevMag=null;
const hop=Math.max(N,Math.floor(ch.length/180));
for(let off=0; off+N<=ch.length && frames<180; off+=hop){
const re=new Float32Array(N), im=new Float32Array(N);
for(let i=0;i<N;i++){const s=ch[off+i]*hann[i]; re[i]=s; rmsSum+=s*s; if(Math.abs(ch[off+i])>peak)peak=Math.abs(ch[off+i]);}
fft(re,im);
let curMag=new Float32Array(N/2), fl=0;
for(let k=1;k<N/2;k++){
const mag=Math.hypot(re[k],im[k]); curMag[k]=mag;
const freq=k*sr/N;
if(freq<60)bands.sub+=mag; else if(freq<150)bands.bass+=mag; else if(freq<500)bands.lowmid+=mag;
else if(freq<2000)bands.mid+=mag; else if(freq<6000)bands.highmid+=mag; else bands.high+=mag;
centroidNum+=freq*mag; centroidDen+=mag;
if(prevMag){const d=mag-prevMag[k]; if(d>0)fl+=d;}
}
flux+=fl; prevMag=curMag; frames++;
}
const total=Object.values(bands).reduce((a,b)=>a+b,0)||1;
const frac={}; for(const k in bands)frac[k]=bands[k]/total;
const rms=Math.sqrt(rmsSum/(frames*N||1));
const crest=peak/(rms||1e-6);
const centroid=centroidDen?centroidNum/centroidDen:0;
const fluxNorm=Math.min(1,flux/(frames*N*0.5||1));
const low=frac.sub+frac.bass, high=frac.highmid+frac.high;
return {rms,crest,centroid,fluxNorm,low,high};
}
function deriveTags(a){
const tags=[];
if(a.low>0.5||a.centroid<500)tags.push("Low-End");
else if(a.high>0.45||a.centroid>4500)tags.push("Bright");
else tags.push("Mid");
if(a.rms>0.16&&(a.high>0.3||a.fluxNorm>0.45))tags.push("Intense");
else if(a.rms<0.045)tags.push("Subtle");
else if(a.crest>7)tags.push("Punchy");
else tags.push("Smooth");
return tags;
}

/* ===== folder drop (recursive) ===== */
function entryFile(entry){return new Promise(res=>entry.file(res));}
function readAllEntries(reader){
return new Promise(res=>{
let all=[];
const read=()=>reader.readEntries(es=>{if(!es.length)res(all); else{all=all.concat(es); read();}});
read();
});
}
async function traverseEntry(entry, folderId){
if(entry.isFile){
if(AUDIO_RE.test(entry.name)){const f=await entryFile(entry); await addFiles([f],folderId);}
}else if(entry.isDirectory){
const newF=createFolderNamed(entry.name, folderId==="all"||!folderId?"uncat":folderId, false);
const reader=entry.createReader();
const entries=await readAllEntries(reader);
for(const e of entries) await traverseEntry(e, newF.id);
}
}

/* ============ Mix engine ============ */
function sliceHead(buffer,ms){
const sr=buffer.sampleRate, len=Math.min(buffer.length,Math.floor(sr*ms/1000));
const out=audioCtx.createBuffer(buffer.numberOfChannels,len,sr);
for(let c=0;c<buffer.numberOfChannels;c++)out.copyToChannel(buffer.getChannelData(c).slice(0,len),c);
return out;
}
function reverseBuffer(buffer){
const out=audioCtx.createBuffer(buffer.numberOfChannels,buffer.length,buffer.sampleRate);
for(let c=0;c<buffer.numberOfChannels;c++){const d=buffer.getChannelData(c).slice(); d.reverse(); out.copyToChannel(d,c);}
return out;
}
const MG_PRESETS={
classic:{mode:"machinegun",hits:12,interval:45,head:90,accel:false,finalHit:true},
accelRoll:{mode:"machinegun",hits:20,interval:80,head:70,accel:true,finalHit:true},
hyper:{mode:"machinegun",hits:18,interval:28,head:55,accel:true,finalHit:true},
heavy:{mode:"machinegun",hits:6,interval:120,head:170,accel:false,finalHit:true},
buzz:{mode:"machinegun",hits:28,interval:22,head:40,accel:false,finalHit:false},
arpUp:{mode:"arp",hits:12,interval:90,head:120,accel:false,finalHit:true},
};
function applyPreset(){
const p=MG_PRESETS[document.getElementById("mgPreset").value];
if(p){document.getElementById("mixMode").value=p.mode;}
updatePresetLabel();
}
function updatePresetLabel(){
const v=document.getElementById("mgPreset").value;
const map={"":"",classic:"定番",accelRoll:"加速ロール",hyper:"ハイパー高速",heavy:"重め単発",buzz:"ブザー",arpUp:"アルペジオ上昇"};
document.getElementById("presetNow").textContent=v?("▶ "+map[v]):"";
}
function getMixOptions(){
const preset=MG_PRESETS[document.getElementById("mgPreset").value];
return {
mode:document.getElementById("mixMode").value,
randPitch:document.getElementById("optPitch").checked,
randReverse:document.getElementById("optReverse").checked,
randPan:document.getElementById("optPan").checked,
hits:preset?preset.hits:10,
interval:preset?preset.interval:60,
headMs:preset?preset.head:140,
accel:preset?preset.accel:false,
finalHit:preset?preset.finalHit:true,
staggerMs:120,
};
}
function buildSchedule(buffers,opt){
const items=[];
const pick=()=>buffers[Math.floor(Math.random()*buffers.length)];
const eff=(b)=>{
let buffer=b, reverse=false;
if(opt.randReverse&&Math.random()<0.5){buffer=reverseBuffer(b); reverse=true;}
const pitch=opt.randPitch?Math.pow(2,((Math.random()*10-5)/12)):1;
const pan=opt.randPan?(Math.random()*1.6-0.8):0;
return {buffer,pitch,pan,reverse};
};
if(opt.mode==="layer"){
buffers.forEach(b=>{const e=eff(b); items.push({buffer:e.buffer,start:0,pitch:e.pitch,pan:e.pan});});
return items;
}
if(opt.mode==="machinegun"||opt.mode==="arp"){
let t=0, gap=opt.interval/1000;
const sorted = opt.mode==="arp" ? [...buffers].sort((a,b)=>a.duration-b.duration) : null;
for(let i=0;i<opt.hits;i++){
const src = opt.mode==="arp" ? sorted[i%sorted.length] : pick();
const e=eff(sliceHead(src,opt.headMs));
items.push({buffer:e.buffer,start:t,pitch: opt.mode==="arp"?Math.pow(2,i/12):e.pitch,pan:e.pan});
t+=gap; if(opt.accel)gap=Math.max(0.012,gap*0.86);
}
if(opt.finalHit){const e=eff(pick()); items.push({buffer:e.buffer,start:t+0.05,pitch:e.pitch,pan:e.pan});}
return items;
}
if(opt.mode==="stagger"){
let t=0; buffers.forEach(b=>{const e=eff(b); items.push({buffer:e.buffer,start:t,pitch:e.pitch,pan:e.pan}); t+=opt.staggerMs/1000;}); return items;
}
buffers.forEach(b=>{const e=eff(b); items.push({buffer:e.buffer,start:Math.random()*1.2,pitch:e.pitch,pan:e.pan});});
return items;
}
function maxConcurrency(items){
const evs=[];
items.forEach(it=>{evs.push([it.start,1]); evs.push([it.start+it.buffer.duration/(it.pitch||1),-1]);});
evs.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
let cur=0,mx=0; evs.forEach(e=>{cur+=e[1]; if(cur>mx)mx=cur;}); return Math.max(1,mx);
}
async function buildMix(items){
if(!items.length)return null;
const sr=44100;
let dur=0; items.forEach(it=>{dur=Math.max(dur,it.start+it.buffer.duration/(it.pitch||1));});
dur+=0.3;
const OAC=window.OfflineAudioContext||window.webkitOfflineAudioContext;
const ctx=new OAC(2,Math.ceil(sr*dur),sr);
const master=ctx.createGain(); master.gain.value=1/Math.sqrt(maxConcurrency(items)); master.connect(ctx.destination);
items.forEach(it=>{
const src=ctx.createBufferSource(); src.buffer=it.buffer; src.playbackRate.value=it.pitch||1;
let node=src;
if(it.pan){const p=ctx.createStereoPanner(); p.pan.value=it.pan; src.connect(p); node=p; p.connect(master);}
else src.connect(master);
src.start(it.start);
});
return await ctx.startRendering();
}
function playBuffer(buffer){
stopMix();
mixSource=audioCtx.createBufferSource(); mixSource.buffer=buffer; mixSource.connect(audioCtx.destination); mixSource.start();
}
function stopMix(){if(mixSource){try{mixSource.stop();}catch(e){} mixSource=null;}}

const buffers=randomSelection.map(id=>tracks.find(t=>t.id===id)?.audioBuffer).filter(Boolean);
const mix=await buildMix(buildSchedule(buffers,getMixOptions()));
if(mix){mixCtx=mix; playBuffer(mix);}
}

/* ============ WAV encode ============ */
function encodeWAV(buffer){
const numCh=buffer.numberOfChannels, sr=buffer.sampleRate, len=buffer.length;
const ab=new ArrayBuffer(44+len*numCh*2), view=new DataView(ab);
const ws=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
ws(0,"RIFF"); view.setUint32(4,36+len*numCh*2,true); ws(8,"WAVE"); ws(12,"fmt ");
view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,numCh,true);
view.setUint32(24,sr,true); view.setUint32(28,sr*numCh*2,true); view.setUint16(32,numCh*2,true);
view.setUint16(34,16,true); ws(36,"data"); view.setUint32(40,len*numCh*2,true);
let off=44;
for(let i=0;i<len;i++)for(let c=0;c<numCh;c++){
let s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));
view.setInt16(off,s<0?s*0x8000:s*0x7fff,true); off+=2;
}
return new Blob([ab],{type:"audio/wav"});
}
function downloadWav(blob,name){
const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click();
setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

const mix=await buildMix(buildSchedule(buffers,getMixOptions()));
if(mix){downloadWav(encodeWAV(mix),"soundsmith_mix.wav"); setStatus("soundsmith_mix.wav を書き出しました");}

function dragClip(e,clip,el){
e.preventDefault();
const startX=e.clientX, orig=clip.start;
const move=ev=>{
let ns=orig+(ev.clientX-startX)/TLPPS;
if(document.getElementById("tlSnap").checked)ns=Math.round(ns*8)/8;
clip.start=Math.max(0,ns); el.style.left=(clip.start*TLPPS)+"px";
};
const up=()=>{document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",up); renderTimeline();};
document.addEventListener("mousemove",move); document.addEventListener("mouseup",up);
}
function buildTimelineItems(){
return timeline.map(c=>{const t=tracks.find(x=>x.id===c.id); return t&&t.audioBuffer?{buffer:t.audioBuffer,start:c.start,pitch:1,pan:0}:null;}).filter(Boolean);
}

let dragFolderId=null;
document.getElementById("folders").addEventListener("dragstart",e=>{const f=e.target.closest(".folder"); if(f){dragFolderId=f.dataset.id;}});
document.getElementById("folders").addEventListener("dragover",e=>{
e.preventDefault();
const f=e.target.closest(".folder");
document.querySelectorAll(".folder.drop").forEach(x=>x.classList.remove("drop"));
if(f)f.classList.add("drop");
});
document.getElementById("folders").addEventListener("drop",e=>{
e.preventDefault();
document.querySelectorAll(".folder.drop").forEach(x=>x.classList.remove("drop"));
const target=e.target.closest(".folder");
if(e.dataTransfer.items&&e.dataTransfer.items.length&&e.dataTransfer.items[0].webkitGetAsEntry){
handleEntries(e.dataTransfer.items, target?target.dataset.id:"uncat"); dragFolderId=null; return;
}
if(dragFolderId){
if(!target||target.dataset.id==="all")setFolderParent(dragFolderId,null);
else setFolderParent(dragFolderId,target.dataset.id);
}
dragFolderId=null;
});

const dz=document.getElementById("dropzone");
dz.onclick=()=>document.getElementById("picker").click();
document.getElementById("picker").onchange=e=>addFiles(e.target.files);
["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault(); dz.classList.add("over");}));
["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault(); dz.classList.remove("over");}));
dz.addEventListener("drop",e=>{
if(e.dataTransfer.items&&e.dataTransfer.items.length&&e.dataTransfer.items[0].webkitGetAsEntry){
handleEntries(e.dataTransfer.items,uploadTarget());
}else{addFiles(e.dataTransfer.files);}
});
async function handleEntries(items,folderId){
const entries=[];
for(const it of items){const en=it.webkitGetAsEntry&&it.webkitGetAsEntry(); if(en)entries.push(en);}
for(const en of entries)await traverseEntry(en,folderId);
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeEmojiPicker();});

/* ============ Boot ============ */
(async function boot(){
folderIconPickerInit();
try{
await openDB();
const savedTheme=await idbGet("kv","theme");
const savedFolders=await idbGet("kv","folders");
const savedTracks=await idbGet("kv","tracks");
if(savedFolders&&savedFolders.length){
folders=savedFolders;
if(!folderById("all"))folders.unshift({id:"all",name:"すべて",parentId:null,fixed:true,icon:"📚"});
if(!folderById("uncat"))folders.push({id:"uncat",name:"未分類",parentId:null,fixed:true,icon:"🗂"});
}
if(savedTracks&&savedTracks.length){
for(const meta of savedTracks){
const blob=await idbGet("blobs",meta.id);
if(!blob)continue;
const t={...meta,blob,loading:true};
tracks.push(t);
}
}
renderAll();
tracks.forEach(loadTrack);
setTheme(savedTheme||"dark");
setStatus(tracks.length?`保存済み ${tracks.length} 件を読み込みました`:"音声をドラッグ&ドロップして始めましょう");
}catch(err){
console.error(err);
setTheme("dark"); renderAll();
setStatus("保存機能の初期化に失敗しました（通常モードで動作します）");
}
updatePresetLabel();
})();
</script>
